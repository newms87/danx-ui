# Danxbot worker for the danx-ui repo.
#
# danx-ui is a pure frontend library (Vite/Vue) — no backend DB or Sail
# stack — so this worker joins ONLY danxbot-net (shared MySQL + dashboard).
# Worker port is sourced from DANXBOT_WORKER_PORT, exported by
# make launch-worker before compose up.
#
# Usage: make launch-worker BOARD=<board-name> (from danxbot/) — DX-979

services:
  danxbot-worker:
    # Image: prod injects DANXBOT_WORKER_IMAGE=<ECR URL>; local falls back to the built danxbot:latest.
    image: ${DANXBOT_WORKER_IMAGE:-danxbot:latest}
    # DX-966 — container name parameterized by (repo, board) so two boards on
    # one repo checkout don't collide. scripts/worker-env.sh exports
    # DANXBOT_CONTAINER_NAME: default board → danxbot-worker-danx-ui (preserves
    # pre-DX-966 naming); non-default board → danxbot-worker-danx-ui-<slug>.
    container_name: ${DANXBOT_CONTAINER_NAME:?Set DANXBOT_CONTAINER_NAME via scripts/worker-env.sh — see DX-966}
    restart: always
    stop_grace_period: 120s
    env_file:
      - ../.env
    environment:
      DANXBOT_REPO_NAME: danx-ui
      # Docker worker is always container runtime (host mode = the separate
      # `DANX_RUNTIME=host` that `make launch-worker-host` exports). config.ts
      # requires this — without it the worker exits(1) on boot. Mirrors gpt-manager.
      DANX_RUNTIME: container
      # DX-962 / DX-966 / DX-979 — per-process board identity. loadBoardContext
      # (src/board-context.ts) reads this; the picker + cron tick scope to it so
      # two boards' workers operate on disjoint queues. DX-979 retired the silent
      # :-default fallback — worker-env.sh always exports an explicit board name.
      DANXBOT_BOARD_NAME: ${DANXBOT_BOARD_NAME:?Set DANXBOT_BOARD_NAME via scripts/worker-env.sh — see DX-979}
      DANXBOT_WORKER_PORT: ${DANXBOT_WORKER_PORT:?Set DANXBOT_WORKER_PORT in repos/danx-ui/.danxbot/.env}
      # Canonical absolute path of the repo on the HOST — see
      # `src/agent/portable-path.ts`. Worktree metadata + spawn cwd use
      # this path so worktrees survive a host↔docker swap.
      DANXBOT_REPO_HOST_PATH: ${DANXBOT_REPO_ROOT}
      DANXBOT_DB_HOST: mysql
      DANXBOT_DB_USER: danxbot
      DANXBOT_DB_PASSWORD: danxbot
      DANXBOT_DB_NAME: danxbot_chat
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Shared dispatch token — the v2 dispatcher loop authenticates to the
      # dashboard with this. It MUST be the SHARED canonical token (the value
      # the dashboard validates against), threaded from the shared --env-file
      # like ANTHROPIC_API_KEY above — NOT the per-repo env_file value, which
      # can be stale/missing and yields 401 / "token not set" in the poller.
      DANXBOT_DISPATCH_TOKEN: ${DANXBOT_DISPATCH_TOKEN}
      # DX-1361 — inbound Slack files are persisted to S3 by THIS worker
      # (the Socket-Mode listener runs in the worker, not the dashboard). The
      # bucket name lives in the shared root /danxbot/.env (deploy/secrets.ts
      # buildTargetOverrides materializes DANX_S3_ATTACHMENTS_BUCKET there);
      # thread it into the container env from the shared --env-file exactly like
      # ANTHROPIC_API_KEY / DANXBOT_DISPATCH_TOKEN above. Without it the worker's
      # S3 PutObject throws "no bucket configured" and the inbound Slack file is
      # silently dropped (the dashboard had the var; the worker did not).
      DANX_S3_ATTACHMENTS_BUCKET: ${DANX_S3_ATTACHMENTS_BUCKET}
      DANX_S3_ATTACHMENTS_REGION: ${DANX_S3_ATTACHMENTS_REGION}
      # DX-1459 — per-user mirror OAuth creds are encrypted at rest with this
      # SHARED key; the worker threads it from the shared --env-file (same family
      # as DANXBOT_DISPATCH_TOKEN / DANX_S3_ATTACHMENTS_*) so its at-rest
      # resolveKey can decrypt them for as-user comment projection. Omit it and
      # resolveKey throws → every mirror OAuth callback / as-user projection 500s.
      DANX_MIRROR_ENCRYPTION_KEY: ${DANX_MIRROR_ENCRYPTION_KEY}
      CLAUDE_AUTH_MODE: ${CLAUDE_AUTH_MODE:-subscription}
      POLLER_INTERVAL_MS: ${POLLER_INTERVAL_MS:-60000}
      TRELLO_REVIEW_MIN_CARDS: ${TRELLO_REVIEW_MIN_CARDS:-10}
      DANXBOT_GIT_EMAIL: ${DANXBOT_GIT_EMAIL:-danxbot@example.com}
      REPOS: ${REPOS}
    volumes:
      # Repo bind: ../.. resolves to /home/newms/web/danx-ui (dev) or /danxbot/repos/danx-ui (prod).
      - ../..:/danxbot/app/repos/danx-ui
      # Portable repo path (DX-230) — mirror-bind same source at host
      # abs path inside container so git realpath() bakes a runtime-agnostic path.
      - ../..:${DANXBOT_REPO_HOST_PATH:?Set DANXBOT_REPO_HOST_PATH (worker-env.sh exports it from DANXBOT_REPO_ROOT)}
      # Claude auth — split mount (file-bind for .claude.json, dir-bind for
      # .claude/). MUST be :rw and use :? required-var syntax. See gpt-manager
      # compose for the full rationale; enforced by
      # src/__tests__/unit/worker-compose-mounts.test.ts.
      - ${CLAUDE_CONFIG_FILE:?CLAUDE_CONFIG_FILE must point at the live host .claude.json — set in danxbot's .env}:/danxbot/app/claude-auth/.claude.json
      - ${CLAUDE_CREDS_DIR:?CLAUDE_CREDS_DIR must point at the live host .claude/ dir containing .credentials.json — set in danxbot's .env}:/danxbot/app/claude-auth/.claude
      # Claude Code session logs — static relative path so the dashboard's
      # per-repo path resolver finds JSONL under the correct namespace
      # (Trello cjAyJpgr). Never re-introduce ${CLAUDE_PROJECTS_DIR}.
      - ../../claude-projects:/home/danxbot/.claude/projects
      # Host docker socket — worker docker CLI resolves to host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # DX-682 — worker-owned runtime volume (per-repo, per-host). Pinned
      # name so the dashboard project can attach via external: true.
      - danxbot-runtime-danx-ui:/var/lib/danxbot/danx-ui
    ports:
      - "${DANXBOT_WORKER_PORT}:${DANXBOT_WORKER_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - danxbot-net
    healthcheck:
      test: curl -f http://localhost:${DANXBOT_WORKER_PORT}/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  danxbot-runtime-danx-ui:
    name: danxbot-runtime-danx-ui

networks:
  danxbot-net:
    external: true
