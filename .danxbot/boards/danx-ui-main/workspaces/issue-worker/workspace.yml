name: issue-worker
description: Poller dispatch — danx-next, danx-start, danx-ideate, danx-epic-link, danx-triage-card
required-placeholders:
  - DANXBOT_STOP_URL
  - DANXBOT_WORKER_PORT
  - DANX_REPO_ROOT
  - DANXBOT_DASHBOARD_URL
  - DANXBOT_DISPATCH_TOKEN
  - DANX_REPO_NAME
  - DANXBOT_BOARD_NAME
  - DANXBOT_PLAYWRIGHT_URL
# DX-660: DANX_AGENT_WORKTREE is set by `src/dispatch/core.ts` ONLY for
# agent-bound dispatches (multi-worker workers like `phil`). Workspace-
# mode dispatches (`/api/launch`, `/api/flesh-out`) leave it unset; the
# resolver substitutes the placeholder to `""` so the agent's process
# env carries an empty string + the PreToolUse worktree-guard hook
# no-ops (its own contract — see `_shared/hooks/worktree-guard.mjs`).
optional-placeholders:
  - DANX_AGENT_WORKTREE
required-gates:
  # DX-1030 — poller enablement moved to `board_poller_settings.enabled`
  # (DB), enforced by the dispatch-v2 loop before pickup. No issuePoller
  # workspace gate.
  - "no CRITICAL_FAILURE flag"
