name: board-chat
description: Per-board operator chat with the danxbot agent (DX-84). Read-only by default — no card mutations without explicit operator instruction.
required-placeholders:
  - DANXBOT_STOP_URL
  - DANX_REPO_ROOT
  - DANXBOT_DASHBOARD_URL
  - DANXBOT_DISPATCH_TOKEN
  - DANX_REPO_NAME
  - DANXBOT_BOARD_NAME
optional-placeholders:
  - DANX_AGENT_WORKTREE
required-gates: []
