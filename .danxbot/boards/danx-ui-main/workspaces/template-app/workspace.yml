name: template-app
description: Generic Vue SFC template-app build/preview — agent-driven multi-app load/edit/save via load_template_app + save_template_app. Zero consumer-specific coupling.
# Template ids are NOT a workspace placeholder. DX-887 retired the
# `ACTIVE_TEMPLATE_ID` overlay key: the agent reads the template id(s) it
# must work on straight from the dispatch task prompt text, then drives the
# per-id `load_template_app(id)` → edit → `save_template_app(id)` loop. The
# launch-time scaffold trigger (DX-883) and the whole-dispatch
# `danxbot_template_save` tool (DX-885, replaced by per-id `save_template_app`)
# are both gone — nothing injects a template id into the overlay anymore.
#
# `DANXBOT_STOP_URL` + `DANXBOT_WORKER_PORT` are auto-injected by dispatch
# core for every worker-mode dispatch. The `load_template_app` /
# `save_template_app` tool endpoints are NOT workspace placeholders — they
# travel as env vars on the danxbot MCP server process
# (`src/agent/mcp-registry.ts`), injected only when the dispatch's repo has
# `template_app` configured (`RepoContext.templateApp != null`). Listing
# them here would throw `PlaceholderError` at resolve time because the
# dispatch overlay never carries those keys.
required-placeholders:
  - DANXBOT_STOP_URL
  - DANXBOT_WORKER_PORT
optional-placeholders: []
required-gates: []
